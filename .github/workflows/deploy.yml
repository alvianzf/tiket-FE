name: Deploy frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync app to VPS
        run: |
          rsync -rlptz --delete \
            --exclude .git --exclude .github --exclude node_modules \
            --exclude '.env*' --exclude '.next/cache' --exclude '*.log' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:tiket-FE/"

      - name: Install runtime deps and restart
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            cd ~/tiket-FE
            npm ci --omit=dev --ignore-scripts
            pm2 restart Frontend --update-env
            sleep 5
            pm2 describe Frontend | grep -q "status.*online"
            curl -sf -o /dev/null http://localhost:3000/
          '
